{% extends "base.html" %}

{% block title %}Add Patient - LeadFlow{% endblock %}
{% block page_title %}Add Patient{% endblock %}

{% block content %}
<div class="p-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">Add New Patient</h1>
        <p class="text-slate-600 mt-2">Register a new patient to the clinic</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-2xl">
        <form method="POST" action="{{ url_for('add_patient') }}" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                <input type="text" name="name" placeholder="Enter patient's full name"
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" name="email" placeholder="Enter email address"
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter phone number"
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Problem/Condition</label>
                <textarea name="problem" placeholder="Describe the patient's problem or condition"
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" rows="3"></textarea>
            </div>

            {% if session.get('role') == 'ADMIN' %}
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Assigned Doctor</label>
                <select name="doctor" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200" required>
                    <option value="">Select Doctor</option>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.doctor_id }}">{{ doctor.name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Date of Birth</label>
                <input type="date" name="dob"
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200">
            </div>

            <div class="flex gap-4 pt-6">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition-all duration-200 shadow-md hover:shadow-lg">
                    Create Patient
                </button>
                <a href="{{ url_for('patients') }}" class="bg-slate-100 hover:bg-slate-200 text-slate-900 px-8 py-3 rounded-xl font-semibold transition-all duration-200 inline-block">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
